services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # These are baked into the JS bundle at build time
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    image: flax-web:latest
    container_name: flax-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Server-side secrets — never exposed to the browser
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # Public vars also available at runtime (Next.js reads them for SSR)
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
